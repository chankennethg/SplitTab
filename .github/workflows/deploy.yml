name: Deploy to Production

on:
  push:
    branches: [main, master]

jobs:
  migrate:
    name: Run Production Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Apply migrations
        run: npm run db:migrate
        env:
          # Use the direct connection URL (not pooler) for DDL migrations
          DATABASE_URL: ${{ secrets.DIRECT_URL }}

  deploy:
    name: Deploy to Vercel (Production)
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - name: Trigger Vercel production deploy
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}" | \
            grep -q "^2" || { echo "Deploy hook failed"; exit 1; }
